---

- name: Include Redis role
  ansible.builtin.include_role:
    name: alphanodes.setup.redis_server
  vars:
    redis_server_maxmemory: "{{ redmine_redis_maxmemory }}"
    redis_server_maxmemory_policy: "{{ redmine_redis_maxmemory_policy }}"
  when: redmine_with_redis
  tags:
    - redmine

- name: Remove memcached (replaced by Redis)
  ansible.builtin.include_role:
    name: alphanodes.setup.memcached
  vars:
    memcached_remove: true
  when: redmine_with_remove_memcached
  tags:
    - redmine

- name: Include account setup tasks
  ansible.builtin.include_tasks: account_setup.yml
  tags:
    - redmine

- name: Import account instance tasks
  ansible.builtin.include_tasks: account_instance.yml
  tags:
    - redmine
  loop: "{{ redmine_instances | dict2items }}"
  loop_control:
    loop_var: r_instance
  when:
    - redmine_setup_instance is defined and redmine_setup_instance == r_instance.key or redmine_setup_instance is undefined
    - r_instance.value.state is undefined or r_instance.value.state != 'absent'

- name: Include Redmine setup tasks
  ansible.builtin.include_tasks: redmine_setup.yml
  tags:
    - redmine

- name: Include Redmine instance tasks
  ansible.builtin.include_tasks: redmine_instance.yml
  tags:
    - redmine
    - nginx
  loop: "{{ redmine_instances | dict2items }}"
  loop_control:
    loop_var: r_instance
  when:
    - redmine_run_instance is defined and redmine_run_instance == r_instance.key or redmine_run_instance is undefined
    - r_instance.value.state is undefined or r_instance.value.state != 'absent'

- name: Include setup activate tasks
  ansible.builtin.include_tasks: activate_instance.yml
  tags:
    - redmine
    - activate
  loop: "{{ redmine_instances | dict2items }}"
  loop_control:
    loop_var: r_instance
  when:
    - redmine_run_instance is defined and redmine_run_instance == r_instance.key or redmine_run_instance is undefined

- name: Include remove tasks
  ansible.builtin.include_tasks: remove_instance.yml
  tags:
    - redmine
    - remove
  loop: "{{ redmine_instances | dict2items }}"
  loop_control:
    loop_var: r_instance
  when:
    - redmine_run_instance is defined and redmine_run_instance == r_instance.key or redmine_run_instance is undefined
    - r_instance.value.state is defined and r_instance.value.state == 'absent'
