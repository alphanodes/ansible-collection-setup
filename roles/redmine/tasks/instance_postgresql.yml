---

- name: Ensure postgresql packages are installed
  ansible.builtin.apt:
    name: '{{ redmine_postgresql_packages }}'
    state: present

- name: Set skip_local_pg_setup - {{ redmine_instance_name }}
  ansible.builtin.set_fact:
    skip_local_pg_setup: "{{ redmine_instance.db_skip_local_setup | default(false) }}"

- name: Create redmine postgresql database users - {{ redmine_instance_name }}
  become_user: postgres
  become: true
  community.postgresql.postgresql_user:
    name: '{{ redmine_db_user }}'
    password: '{{ redmine_instance.db_password | default(redmine_db_password) }}'
    role_attr_flags: "{{ redmine_instance.rb_role_flags | default('NOSUPERUSER,CREATEDB') }}"
    state: present
  no_log: '{{ hide_sensitive_data }}'
  when:
    - not skip_local_pg_setup
    - redmine_instance.db_skip_user_setup is undefined or not redmine_instance.db_skip_user_setup

- name: Be sure redmine postgresql databases exists - {{ redmine_instance_name }}
  become_user: postgres
  become: true
  community.postgresql.postgresql_db:
    name: '{{ redmine_db_name }}'
    owner: '{{ redmine_db_user }}'
    state: present
  when: not skip_local_pg_setup

- name: Add extention pg_stat_statements to Redmine database
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: pg_stat_statements
    login_db: '{{ redmine_db_name }}'
  when:
    - not skip_local_pg_setup
    - postgresql_with_pg_stat_statements

- name: Add extention pg_buffercache to Redmine database
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: pg_buffercache
    login_db: '{{ redmine_db_name }}'
    state: "{{ 'present' if postgresql_with_pg_buffercache else 'absent' }}"
  when: not skip_local_pg_setup

- name: Add unaccent extension to Redmine database - {{ redmine_instance_name }}
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: unaccent
    login_db: '{{ redmine_db_name }}'
  when: not skip_local_pg_setup

- name: Add pg_trgm extension to Redmine database - {{ redmine_instance_name }}
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: pg_trgm
    login_db: '{{ redmine_db_name }}'
  when: not skip_local_pg_setup

- name: Add pgvector extension to Redmine database - {{ redmine_instance_name }}
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: vector
    login_db: '{{ redmine_db_name }}'
  when:
    - not skip_local_pg_setup
    - active_pgvector

- name: Run postgresql pre commands - {{ redmine_instance_name }}
  community.postgresql.postgresql_query:
    query: '{{ item }}'
    login_user: postgres
    login_db: '{{ redmine_db_name }}'
  loop: '{{ redmine_instance.pre_db_commands | default([]) }}'
  when: not skip_local_pg_setup

# Per-database PostgreSQL parameters (ALTER DATABASE ... SET ...).
# Persisted in pg_db_role_setting, survives restarts but not a database
# re-import, so it is reapplied here on every run. Works for managed
# databases (e.g. Cloud SQL) where ALTER SYSTEM / postgresql.conf are not
# available: connects as the database owner over the network.
- name: Read current per-database PostgreSQL parameters - {{ redmine_instance_name }}
  community.postgresql.postgresql_query:
    login_host: '{{ redmine_instance.db_host | default(omit) }}'
    login_port: '{{ redmine_instance.db_port | default(omit) }}'
    login_user: '{{ redmine_db_user }}'
    login_password: '{{ redmine_instance.db_password | default(redmine_db_password) }}'
    login_db: '{{ redmine_db_name }}'
    query: >-
      SELECT lower(split_part(opt, '=', 1)) AS key, split_part(opt, '=', 2) AS value
      FROM pg_db_role_setting s
      JOIN pg_database d ON d.oid = s.setdatabase
      CROSS JOIN unnest(s.setconfig) AS opt
      WHERE d.datname = %(db)s AND s.setrole = 0
    named_args:
      db: '{{ redmine_db_name }}'
  register: redmine_db_current_params
  changed_when: false
  no_log: '{{ hide_sensitive_data }}'
  when: (redmine_instance.db_parameters | default({})) | length > 0

- name: Apply per-database PostgreSQL parameters - {{ redmine_instance_name }}
  community.postgresql.postgresql_query:
    login_host: '{{ redmine_instance.db_host | default(omit) }}'
    login_port: '{{ redmine_instance.db_port | default(omit) }}'
    login_user: '{{ redmine_db_user }}'
    login_password: '{{ redmine_instance.db_password | default(redmine_db_password) }}'
    login_db: '{{ redmine_db_name }}'
    query: "ALTER DATABASE \"{{ redmine_db_name }}\" SET {{ item.key }} = '{{ item.value }}'"
  loop: '{{ (redmine_instance.db_parameters | default({})) | dict2items }}'
  loop_control:
    label: '{{ item.key }} = {{ item.value }}'
  no_log: '{{ hide_sensitive_data }}'
  when:
    - (redmine_instance.db_parameters | default({})) | length > 0
    - (redmine_db_current_params.query_result | default([]) | selectattr('key', 'equalto', item.key | lower) | map(attribute='value') | first | default('')) != (item.value | string)
