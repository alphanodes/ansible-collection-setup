---

- name: Ensure redmine instance configuration directory exists - {{ redmine_instance_name }}
  ansible.builtin.file:
    path: '{{ redmine_config_dir }}'
    owner: '{{ redmine_instance_name }}'
    group: '{{ redmine_instance_name }}'
    mode: '0755'
    state: directory

- name: Configure Gemfile.local - {{ redmine_instance_name }}
  ansible.builtin.template:
    src: redmine/Gemfile.j2
    dest: '{{ redmine_app_dir }}/Gemfile.local'
    owner: '{{ redmine_user }}'
    group: '{{ redmine_group }}'
    mode: '0644'
    validate: ruby -c %s

- name: Setup sudoer for zabbix - {{ redmine_instance_name }}
  ansible.builtin.template:
    src: etc/sudoers.d/redmine.j2
    dest: /etc/sudoers.d/{{ redmine_instance_name }}
    mode: '0440'

- name: Include redmine configuration file tasks
  ansible.builtin.include_tasks: instance_config_file.yml
  loop: "{{ redmine_config_templates }}"
  loop_control:
    loop_var: config_file

- name: Active Storage configuration block (DMSF)
  when: redmine_instance.with_dmsf is defined and redmine_instance.with_dmsf
  block:
    - name: Active Storage storage.yml - {{ redmine_instance_name }}
      ansible.builtin.template:
        src: redmine/config/storage.yml.j2
        dest: '{{ redmine_config_dir }}/storage.yml'
        owner: '{{ redmine_instance_name }}'
        group: '{{ redmine_instance_name }}'
        mode: '0640'

    - name: Get storage.yml link info - {{ redmine_instance_name }}
      ansible.builtin.stat:
        path: '{{ redmine_app_dir }}/config/storage.yml'
      register: storage_file_info

    - name: Remove storage.yml, if not a link - {{ redmine_instance_name }}
      ansible.builtin.file:
        path: '{{ redmine_app_dir }}/config/storage.yml'
        state: absent
      when:
        - storage_file_info.stat.islnk is defined
        - not storage_file_info.stat.islnk

    - name: Symlink to storage.yml - {{ redmine_instance_name }}
      ansible.builtin.file:
        src: '{{ redmine_config_dir }}/storage.yml'
        dest: '{{ redmine_app_dir }}/config/storage.yml'
        state: link
      become: false
      become_user: '{{ redmine_user }}'

- name: Merge projects block
  when: redmine_instance.merge_projects_config is defined
  block:
    - name: Merge_projects configuration file - {{ redmine_instance_name }}
      ansible.builtin.copy:
        src: 'merge_projects/{{ redmine_instance.merge_projects_config }}'
        dest: '{{ redmine_config_dir }}/merge_projects.rb'
        owner: '{{ redmine_instance_name }}'
        group: '{{ redmine_instance_name }}'
        mode: '0640'

    - name: Get link info - {{ redmine_instance_name }}
      ansible.builtin.stat:
        path: '{{ redmine_app_dir }}/config/merge_projects.rb'
      register: file_info

    - name: Remove merge_projects file, if not a link - {{ redmine_instance_name }}
      ansible.builtin.file:
        path: '{{ redmine_app_dir }}/config/merge_projects.rb'
        state: absent
      when:
        - file_info.stat.islnk is defined
        - not file_info.stat.islnk

    - name: Symlinks to merge_projects configuration file - {{ redmine_instance_name }}
      ansible.builtin.file:
        src: '{{ redmine_config_dir }}/merge_projects.rb'
        dest: '{{ redmine_app_dir }}/config/merge_projects.rb'
        state: link
      become: false
      become_user: '{{ redmine_user }}'

- name: Database configuration block
  when: redmine_instance.no_db_config_file is undefined or not redmine_instance.no_db_config_file
  block:
    - name: Update redmine database configuration - {{ redmine_instance_name }}
      ansible.builtin.template:
        src: redmine/config/database.yml.j2
        dest: '{{ redmine_config_dir }}/database.yml'
        owner: '{{ redmine_user }}'
        group: '{{ redmine_group }}'
        mode: '0640'

    - name: Get link info - {{ redmine_instance_name }}
      ansible.builtin.stat:
        path: '{{ redmine_app_dir }}/config/database.yml'
      register: file_info

    - name: Remove database configuration file, if not a link - {{ redmine_instance_name }}
      ansible.builtin.file:
        path: '{{ redmine_app_dir }}/config/database.yml'
        state: absent
      when:
        - file_info.stat.islnk is defined
        - not file_info.stat.islnk

    - name: Symlinks to database configuration - {{ redmine_instance_name }}
      ansible.builtin.file:
        src: '{{ redmine_config_dir }}/database.yml'
        dest: '{{ redmine_app_dir }}/config/database.yml'
        state: link
      become: false
      become_user: '{{ redmine_user }}'
