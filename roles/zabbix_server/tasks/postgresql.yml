---

- name: Create Zabbix postgresql database user
  become_user: postgres
  become: true
  community.postgresql.postgresql_user:
    name: '{{ zabbix_server_db_user }}'
    password: '{{ zabbix_server_db_password }}'
    role_attr_flags: '{{ zabbix_server_db_role_flags }}'
    state: present
  no_log: '{{ hide_sensitive_data }}'

- name: Be sure Zabbix postgresql databases exists
  become_user: postgres
  become: true
  community.postgresql.postgresql_db:
    name: '{{ zabbix_server_db_name }}'
    owner: '{{ zabbix_server_db_user }}'
    state: present
  register: zabbix_db_created

- name: Check if Zabbix schema is already imported
  become_user: postgres
  become: true
  community.postgresql.postgresql_query:
    db: '{{ zabbix_server_db_name }}'
    query: "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'users'"
  register: zabbix_schema_check

- name: Find Zabbix SQL schema file
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/share/zabbix/sql-scripts/postgresql/server.sql.gz
    - /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz
  register: zabbix_sql_files
  when: zabbix_schema_check.query_result[0].count == 0

- name: Set Zabbix SQL schema path
  ansible.builtin.set_fact:
    zabbix_server_sql_schema: "{{ item.item }}"
  loop: "{{ zabbix_sql_files.results | default([]) }}"
  when:
    - zabbix_schema_check.query_result[0].count == 0
    - item.stat is defined
    - item.stat.exists

- name: Import Zabbix database schema
  become_user: '{{ zabbix_server_db_user }}'
  become: true
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      zcat {{ zabbix_server_sql_schema }} | psql -d {{ zabbix_server_db_name }}
    executable: /bin/bash
  when:
    - zabbix_schema_check.query_result[0].count == 0
    - zabbix_server_sql_schema is defined

- name: Be sure timescaledb extension exists
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: timescaledb
    login_db: '{{ zabbix_server_db_name }}'
  when: zabbix_server_with_timescaledb

- name: Check if TimescaleDB hypertables are configured
  become_user: postgres
  become: true
  community.postgresql.postgresql_query:
    db: '{{ zabbix_server_db_name }}'
    query: "SELECT COUNT(*) FROM timescaledb_information.hypertables WHERE hypertable_name = 'history'"
  register: zabbix_timescaledb_check
  when: zabbix_server_with_timescaledb

- name: Stop zabbix-server for TimescaleDB migration
  ansible.builtin.systemd_service:
    name: zabbix-server
    state: stopped
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Create cuid_timestamp function for TimescaleDB
  become_user: postgres
  become: true
  ansible.builtin.shell:
    cmd: |
      psql --set ON_ERROR_STOP=on -d {{ zabbix_server_db_name }} <<'ENDSQL'
      CREATE OR REPLACE FUNCTION cuid_timestamp(cuid varchar(25)) RETURNS integer AS $$
      DECLARE
        base36 varchar;
        a char[];
        ret bigint;
        i int;
        val int;
        chars varchar;
      BEGIN
        base36 := substring(cuid FROM 2 FOR 8);
        chars := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        FOR i IN REVERSE char_length(base36)..1 LOOP
          a := a || substring(upper(base36) FROM i FOR 1)::char;
        END LOOP;
        i := 0;
        ret := 0;
        WHILE i < (array_length(a, 1)) LOOP
          val := position(a[i + 1] IN chars) - 1;
          ret := ret + (val * (36 ^ i));
          i := i + 1;
        END LOOP;
        RETURN CAST(ret/1000 AS integer);
      END;
      $$ LANGUAGE 'plpgsql' IMMUTABLE;
      ENDSQL
    executable: /bin/bash
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Migrate Zabbix tables to TimescaleDB hypertables
  become_user: postgres
  become: true
  ansible.builtin.shell:
    cmd: >-
      psql --set ON_ERROR_STOP=on -d {{ zabbix_server_db_name }} -c
      "SELECT create_hypertable('{{ item.table }}', '{{ item.column }}',
      chunk_time_interval => {{ item.interval }},
      migrate_data => true, if_not_exists => true);"
    executable: /bin/bash
  loop: "{{ zabbix_server_timescaledb_tables }}"
  loop_control:
    label: "{{ item.table }}"
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Migrate auditlog to TimescaleDB hypertable
  become_user: postgres
  become: true
  ansible.builtin.shell:
    cmd: >-
      psql --set ON_ERROR_STOP=on -d {{ zabbix_server_db_name }} -c
      "SELECT create_hypertable('auditlog', 'auditid',
      chunk_time_interval => 604800,
      time_partitioning_func => 'cuid_timestamp',
      migrate_data => true, if_not_exists => true);"
    executable: /bin/bash
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Configure Zabbix TimescaleDB settings
  become_user: postgres
  become: true
  ansible.builtin.shell:
    cmd: >-
      psql --set ON_ERROR_STOP=on -d {{ zabbix_server_db_name }}
      -c "UPDATE settings SET value_str='timescaledb' WHERE name='db_extension'"
      -c "UPDATE settings SET value_int=1 WHERE name='hk_history_global'"
      -c "UPDATE settings SET value_int=1 WHERE name='hk_trends_global'"
      -c "UPDATE settings SET value_int=1 WHERE name='compression_status'"
      -c "UPDATE settings SET value_str='7d' WHERE name='compress_older'"
    executable: /bin/bash
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Verify TimescaleDB migration
  become_user: postgres
  become: true
  community.postgresql.postgresql_query:
    db: '{{ zabbix_server_db_name }}'
    query: >-
      SELECT hypertable_name, num_chunks, compression_enabled
      FROM timescaledb_information.hypertables
      ORDER BY hypertable_name
  register: zabbix_timescaledb_verify
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Show TimescaleDB migration result
  ansible.builtin.debug:
    var: zabbix_timescaledb_verify.query_result
  when: zabbix_timescaledb_verify is not skipped

- name: Start zabbix-server after TimescaleDB migration
  ansible.builtin.systemd_service:
    name: zabbix-server
    state: started
  when:
    - zabbix_server_with_timescaledb
    - zabbix_timescaledb_check.query_result[0].count == 0

- name: Check if pg_buffercache extension exists
  become_user: postgres
  become: true
  community.postgresql.postgresql_query:
    db: '{{ zabbix_server_db_name }}'
    query: "SELECT 1 FROM pg_extension WHERE extname = 'pg_buffercache'"
  register: pg_buffercache_check

- name: Add extention pg_buffercache to Zabbix database
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: pg_buffercache
    db: '{{ zabbix_server_db_name }}'
    state: present
  when:
    - postgresql_with_pg_buffercache
    - pg_buffercache_check.rowcount == 0

- name: Remove extention pg_buffercache from Zabbix database
  become_user: postgres
  become: true
  community.postgresql.postgresql_ext:
    name: pg_buffercache
    db: '{{ zabbix_server_db_name }}'
    state: absent
  when:
    - not postgresql_with_pg_buffercache
    - pg_buffercache_check.rowcount > 0
