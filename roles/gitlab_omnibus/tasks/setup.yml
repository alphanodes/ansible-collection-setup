---

- name: Set activ_object_store_consolidated
  ansible.builtin.set_fact:
    activ_object_store_consolidated: "{{ gitlab_object_store_consolidated and gitlab_object_store_connection | length > 1 }}"

- name: Refresh GitLab apt signing key
  ansible.builtin.get_url:
    url: '{{ gitlab_apt_signed_by }}'
    dest: /etc/apt/keyrings/gitlab.asc
    mode: '0644'
    force: true
  when: gitlab_apt_refresh_signing_key

- name: Add Gitlab apt repository
  ansible.builtin.deb822_repository:
    name: gitlab
    uris: '{{ gitlab_apt_url }}'
    types: deb
    suites: '{{ gitlab_apt_suites }}'
    components: '{{ gitlab_apt_components }}'
    signed_by: '{{ gitlab_apt_signed_by }}'
    state: present

- name: Update apt cache after adding repository
  ansible.builtin.apt:
    update_cache: true
  changed_when: false

# ruby just used for syntax check
- name: Include system ruby
  ansible.builtin.include_role:
    name: alphanodes.setup.ruby

- name: Ensure required packages are installed
  ansible.builtin.apt:
    name: "{{ gitlab_required_packages }}"
    state: present
  notify: Reconfigure GitLab

- name: Ensure gitlab.rb configuration is latest
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: "{{ gitlab_config_file }}"
    owner: root
    group: root
    mode: '0600'
    validate: ruby -c %s
  register: config_change
  notify: Reconfigure GitLab

- name: Force reconfigure GitLab
  ansible.builtin.command: gitlab-ctl reconfigure
  when: gitlab_force_reconfigure and not config_change.changed

- name: Check GitLab log directories exist
  ansible.builtin.stat:
    path: '{{ item }}'
  loop: '{{ gitlab_log_dirs }}'
  register: gitlab_log_dirs_stat

- name: Set ACL read access on GitLab log directories
  ansible.posix.acl:
    path: '{{ item.0.item }}'
    entity: '{{ item.1 }}'
    etype: user
    permissions: rx
    state: present
  loop: "{{ gitlab_log_dirs_stat.results | selectattr('stat.exists') | product(gitlab_log_acl_users) }}"
  loop_control:
    label: "{{ item.1 }} -> {{ item.0.item }}"
  when: gitlab_log_acl_users | length > 0
