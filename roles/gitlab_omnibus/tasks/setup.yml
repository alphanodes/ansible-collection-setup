---

- name: Set activ_object_store_consolidated
  ansible.builtin.set_fact:
    activ_object_store_consolidated: "{{ gitlab_object_store_consolidated and gitlab_object_store_connection | length > 1 }}"

- name: Refresh GitLab apt signing key
  ansible.builtin.get_url:
    url: '{{ gitlab_apt_signed_by }}'
    dest: /etc/apt/keyrings/gitlab.asc
    mode: '0644'
    force: true
  when: gitlab_apt_refresh_signing_key

- name: Add Gitlab apt repository
  ansible.builtin.deb822_repository:
    name: gitlab
    uris: '{{ gitlab_apt_url }}'
    types: deb
    suites: '{{ gitlab_apt_suites }}'
    components: '{{ gitlab_apt_components }}'
    signed_by: '{{ gitlab_apt_signed_by }}'
    state: present

- name: Update apt cache after adding repository
  ansible.builtin.apt:
    update_cache: true
  changed_when: false

# ruby just used for syntax check
- name: Include system ruby
  ansible.builtin.include_role:
    name: alphanodes.setup.ruby

- name: Ensure required packages are installed
  ansible.builtin.apt:
    name: "{{ gitlab_required_packages }}"
    state: present
  notify: Reconfigure GitLab

- name: Ensure gitlab.rb configuration is latest
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: "{{ gitlab_config_file }}"
    owner: root
    group: root
    mode: '0600'
    validate: ruby -c %s
  register: config_change
  notify: Reconfigure GitLab

- name: Force reconfigure GitLab
  ansible.builtin.command: gitlab-ctl reconfigure
  when: gitlab_force_reconfigure and not config_change.changed

- name: Set up Zabbix monitoring for GitLab Omnibus
  when:
    - zabbix_monitoring
    - zabbix_agent_remove is undefined or not zabbix_agent_remove
  block:
    - name: Deploy Zabbix agent2 Redis plugin config for Omnibus
      ansible.builtin.template:
        src: redis_omnibus.conf.j2
        dest: /etc/zabbix/zabbix_agent2.d/plugins.d/redis_omnibus.conf
        mode: '0644'
      notify: Restart zabbix-agent2
      when: gitlab_zabbix_redis_socket | length > 0

    - name: Set ACL on Redis socket directory for Zabbix
      ansible.posix.acl:
        path: '{{ gitlab_zabbix_redis_dir }}'
        entity: zabbix
        etype: user
        permissions: rx
        state: present
      when: gitlab_zabbix_redis_socket | length > 0

- name: Set up log directory ACLs
  when:
    - gitlab_log_acl_users | length > 0
    - zabbix_monitoring
  block:
    - name: Ensure acl package is installed
      ansible.builtin.apt:
        name: acl
        state: present

    - name: Check GitLab log directories exist
      ansible.builtin.stat:
        path: '{{ item }}'
      loop: '{{ gitlab_log_dirs }}'
      register: gitlab_log_dirs_stat

    - name: Set ACL read access on GitLab log directories
      ansible.posix.acl:
        path: '{{ item.0.item }}'
        entity: '{{ item.1 }}'
        etype: user
        permissions: rx
        state: present
      loop: "{{ gitlab_log_dirs_stat.results | selectattr('stat.exists') | product(gitlab_log_acl_users) }}"
      loop_control:
        label: "{{ item.1 }} -> {{ item.0.item }}"
