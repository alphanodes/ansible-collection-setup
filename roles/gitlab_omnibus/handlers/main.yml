---

- name: Reconfigure GitLab
  ansible.builtin.command: gitlab-ctl reconfigure
  environment:
    GITLAB_ROOT_EMAIL: '{{ gitlab_root_email | default(omit) }}'
    GITLAB_ROOT_PASSWORD: '{{ gitlab_root_password | default(omit) }}'

- name: Restart zabbix-agent2
  ansible.builtin.service:
    name: zabbix-agent2
    state: restarted
