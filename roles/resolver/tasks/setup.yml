---

# resolver_mode is empty by default -- in that case this role does nothing
# and leaves DNS configuration alone. Tasks below only run when an admin
# explicitly opts in via 'static' or 'systemd_resolved'.

- name: Assert resolver has at least one DNS source
  ansible.builtin.assert:
    that:
      - resolver_with_unbound or resolver_nameservers | length > 0
    fail_msg: >
      Resolver requires either resolver_with_unbound=true or non-empty
      resolver_nameservers. Otherwise /etc/resolv.conf would be empty and
      DNS resolution on the host would break.
  when: resolver_mode in ['static', 'systemd_resolved']

# unbound must be installed and listening before /etc/resolv.conf or
# systemd-resolved are pointed at 127.0.0.1, otherwise lookups break for
# the duration of the rollout. We pass unbound_mask_resolvconf_helper
# explicitly so that direct users of unbound (without this role) keep the
# distro default while our managed setups always mask the helper.
- name: Include unbound role for local DNS cache
  ansible.builtin.include_role:
    name: alphanodes.setup.unbound
  vars:
    unbound_mask_resolvconf_helper: true
  when:
    - resolver_with_unbound
    - resolver_mode in ['static', 'systemd_resolved']

- name: Configure systemd-resolved
  ansible.builtin.import_tasks: systemd_resolved.yml
  when: resolver_mode == 'systemd_resolved'

- name: Configure static resolv.conf
  ansible.builtin.import_tasks: static.yml
  when: resolver_mode == 'static'

# Postfix in chroot mode keeps its own copy of /etc/resolv.conf under
# /var/spool/postfix/etc/. The distro's resolvconf hook used to refresh it;
# with resolvconf removed we sync it from here whenever the resolver runs.
- name: Stat postfix chroot resolv.conf
  ansible.builtin.stat:
    path: /var/spool/postfix/etc/resolv.conf
  register: resolver_postfix_chroot_resolv

- name: Sync /etc/resolv.conf into postfix chroot
  ansible.builtin.copy:
    src: /etc/resolv.conf
    dest: /var/spool/postfix/etc/resolv.conf
    remote_src: true
    owner: root
    group: root
    mode: '0644'
  when: resolver_postfix_chroot_resolv.stat.exists
