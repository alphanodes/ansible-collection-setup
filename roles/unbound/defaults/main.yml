---
# defaults file for unbound
# see https://thomas-leister.de/unbound-als-lokaler-dns-resolver/
# see https://github.com/aruhier/ansible-role-unbound

unbound_packages:
  - unbound
  - unbound-anchor
  # provides /usr/share/dns/root.key (DNSSEC trust anchor); not pulled in
  # automatically on Debian 13 trixie unlike on Ubuntu, breaks unbound startup
  - dns-root-data
  # for dig
  - bind9-dnsutils

# do uninstall unbound, set it to yes
unbound_remove: false

unbound_root_key_file: /var/lib/unbound/root.key
unbound_user: unbound
unbound_group: unbound

unbound_fallback_dns: "{{ server_systemd_resolved_dns_server | default(['8.8.8.8', '8.8.4.4']) }}"
