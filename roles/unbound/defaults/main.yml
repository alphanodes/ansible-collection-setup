---
# defaults file for unbound
# see https://thomas-leister.de/unbound-als-lokaler-dns-resolver/
# see https://github.com/aruhier/ansible-role-unbound

unbound_packages:
  - unbound
  # provides /usr/share/dns/root.key (DNSSEC trust anchor). unbound's
  # systemd ExecStartPre /usr/libexec/unbound-helper root_trust_anchor_update
  # copies it to /var/lib/unbound/root.key on every start, so the key is
  # always current. Not a default Recommends on Debian 13 trixie unlike
  # Ubuntu, so install explicitly.
  - dns-root-data
  # for dig
  - bind9-dnsutils

# do uninstall unbound, set it to yes
unbound_remove: false

unbound_root_key_file: /var/lib/unbound/root.key
unbound_user: unbound
unbound_group: unbound

# Mask the distro-provided unbound-resolvconf.service helper. It registers
# unbound with resolvconf, which conflicts with systemd-resolved or an
# Ansible-managed static /etc/resolv.conf. Defaults to false so that direct
# users of this role keep the distro behavior intact; the resolver role
# overrides this to true when it manages /etc/resolv.conf itself.
unbound_mask_resolvconf_helper: false
