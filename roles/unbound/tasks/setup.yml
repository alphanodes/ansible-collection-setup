---

- name: Be sure unbound is installed
  ansible.builtin.apt:
    name: '{{ unbound_packages }}'
    state: present

# /var/lib/unbound/root.key is populated and chowned to unbound:unbound 0644
# by unbound's ExecStartPre /usr/libexec/unbound-helper root_trust_anchor_update
# on every service start, copying it from /usr/share/dns/root.key (dns-root-data).

- name: Configure systemd-resolved for unbound
  when: >
    (server_resolver is defined and server_resolver == 'systemd_resolved')
    or server_resolver is undefined and ansible_facts.distribution == 'Ubuntu'
  block:
    - name: Make sure conf override dir exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure systemd-resolved for unbound
      ansible.builtin.template:
        src: resolved.conf.j2
        dest: /etc/systemd/resolved.conf.d/unbound.conf
        mode: '0644'
      notify: Restart systemd-resolved

- name: Start the unbound service (systemd)
  ansible.builtin.systemd_service:
    name: unbound
    state: started
  register: systemd_rc

- name: Run systemd
  when: >
    systemd_rc.status is undefined
    or systemd_rc.status.ActiveState != 'active'
    or (systemd_rc.status.NeedDaemonReload is defined and systemd_rc.status.NeedDaemonReload != 'no')
  block:
    - name: Reload daemon-reload for init script changes (systemd)
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start the unbound service (systemd)
      ansible.builtin.systemd_service:
        name: unbound
        state: started
        enabled: true
