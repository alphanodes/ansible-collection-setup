---

- name: Be sure unbound is installed
  ansible.builtin.apt:
    name: '{{ unbound_packages }}'
    state: present

# /var/lib/unbound/root.key is populated and chowned to unbound:unbound 0644
# by unbound's ExecStartPre /usr/libexec/unbound-helper root_trust_anchor_update
# on every service start, copying it from /usr/share/dns/root.key (dns-root-data).

- name: Deploy unbound server config
  ansible.builtin.template:
    src: ansible.conf.j2
    dest: /etc/unbound/unbound.conf.d/ansible.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart unbound

# The distro-provided unbound-resolvconf.service registers unbound with
# resolvconf. With systemd-resolved or Ansible-managed static resolv.conf
# it only fails or no-ops. Opt out via unbound_mask_resolvconf_helper=false
# when using classic resolvconf.
# Removing the WantedBy symlink as well so monitoring (e.g. Zabbix) does
# not flag the service as "configured at startup".
- name: Remove unbound-resolvconf WantedBy symlink
  ansible.builtin.file:
    path: /etc/systemd/system/unbound.service.wants/unbound-resolvconf.service
    state: absent
  when: unbound_mask_resolvconf_helper
  notify: Reload systemd

- name: Mask unbound-resolvconf helper service
  ansible.builtin.systemd_service:
    name: unbound-resolvconf.service
    state: stopped
    masked: true
  when: unbound_mask_resolvconf_helper

- name: Start the unbound service (systemd)
  ansible.builtin.systemd_service:
    name: unbound
    state: started
  register: systemd_rc

- name: Run systemd
  when: >
    systemd_rc.status is undefined
    or systemd_rc.status.ActiveState != 'active'
    or (systemd_rc.status.NeedDaemonReload is defined and systemd_rc.status.NeedDaemonReload != 'no')
  block:
    - name: Reload daemon-reload for init script changes (systemd)
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Start the unbound service (systemd)
      ansible.builtin.systemd_service:
        name: unbound
        state: started
        enabled: true
