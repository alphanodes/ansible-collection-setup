---

- name: With carddav
  when: roundcube_with_carddav
  vars:
    rcmcarddav_version: v5.1.3
  block:
    # see https://github.com/mstilkerich/rcmcarddav
    # We use the release tarball (with bundled vendor) instead of git+composer
    # because composer in the plugin dir pulls roundcube/roundcubemail as a
    # transitive dep via roundcube/plugin-installer, which then shadows the
    # main Roundcube installation's classes via the autoloader.
    - name: Check installed rcmcarddav version
      ansible.builtin.command:
        cmd: grep -oE "PLUGIN_VERSION = '[^']+'" {{ roundcube_plugins_dir }}/carddav/carddav.php
      register: rcmcarddav_installed
      changed_when: false
      failed_when: false

    - name: Install rcmcarddav from release tarball
      ansible.builtin.unarchive:
        src: 'https://github.com/mstilkerich/rcmcarddav/releases/download/{{ rcmcarddav_version }}/carddav-{{ rcmcarddav_version }}.tgz'
        dest: '{{ roundcube_plugins_dir }}/'
        remote_src: true
        owner: "{{ nginx_user }}"
        group: "{{ nginx_group }}"
      when: rcmcarddav_version not in rcmcarddav_installed.stdout

    - name: Configuration for rcmcarddav
      ansible.builtin.template:
        src: carddav_config.inc.php.j2
        dest: '{{ roundcube_plugins_dir }}/carddav/config.inc.php'
        owner: "{{ nginx_user }}"
        group: "{{ nginx_group }}"
        mode: '0640'

# see https://plugins.roundcube.net/packages/johndoh/contextmenu
- name: Install contextmenu
  ansible.builtin.git:
    repo: https://github.com/JohnDoh/Roundcube-Plugin-Context-Menu.git
    dest: '{{ roundcube_plugins_dir }}/contextmenu'
    version: '3.3.1'
    accept_hostkey: true
  when: roundcube_with_contextmenu

- name: Configuration for password plugin
  ansible.builtin.template:
    src: password_config.inc.php.j2
    dest: '{{ roundcube_plugins_dir }}/password/config.inc.php'
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0640'
  when: roundcube_with_password
