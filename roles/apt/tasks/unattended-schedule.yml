---

# Schedule and trigger of unattended-upgrades: 20auto-upgrades enables
# the apt.systemd.daily mechanism, the timer overrides set the run
# cadence, and apt-kernel-purge cleans up after kernel upgrades.
# Disable this whole block on hosts whose updates are driven by an
# external mechanism that owns its own cadence.

- name: Enable apt.systemd.daily activity
  ansible.builtin.template:
    src: apt/apt.conf.d/20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

- name: Remove obsolete schedule artefacts
  ansible.builtin.file:
    path: /etc/systemd/apt-daily.timer.d
    state: absent

- name: Make sure conf override dirs exists
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/systemd/system/apt-daily.timer.d
    - /etc/systemd/system/apt-daily-upgrade.timer.d

# to update the package lists (apt-get update)
- name: Configure apt-daily.timer
  ansible.builtin.template:
    src: systemd/apt-daily.timer.d/override.conf.j2
    dest: /etc/systemd/system/apt-daily.timer.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart apt-daily.timer

# to install the upgrades (unattended-upgrade)
- name: Configure apt-daily-upgrade.timer
  ansible.builtin.template:
    src: systemd/apt-daily-upgrade.timer.d/override.conf.j2
    dest: /etc/systemd/system/apt-daily-upgrade.timer.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart apt-daily-upgrade.timer
