# Zabbix agent 2 UserParameter for Matomo Archiver template.
# Deployed by the matomo role to /etc/zabbix/zabbix_agent2.d/.
#
# The helper script reads LastCompletedFullArchiving from the local Matomo
# database via a dedicated read-only MySQL user. Its credentials live in
# /etc/zabbix/matomo.my.cnf (mode 0640, owner zabbix:zabbix).
UserParameter=matomo.archive.last_success.age,/usr/local/bin/zabbix-matomo-archive-age.sh
